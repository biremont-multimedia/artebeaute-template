name: Zammad - Notify Deploy

on:
  pull_request:
    types: [closed]
    branches: [main]

jobs:
  notify:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    env:
      ZAMMAD_URL: ${{ secrets.ZAMMAD_URL }}
      ZAMMAD_TOKEN: ${{ secrets.ZAMMAD_API_TOKEN }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      TENANT: ${{ vars.TENANT_NAME || 'SB' }}
      REPO: ${{ github.repository }}
      PR_NUMBER: ${{ github.event.pull_request.number }}
      PR_TITLE: ${{ github.event.pull_request.title }}
      PR_BODY: ${{ github.event.pull_request.body }}
      PR_URL: ${{ github.event.pull_request.html_url }}
      PR_AUTHOR: ${{ github.event.pull_request.user.login }}
      MERGE_SHA: ${{ github.event.pull_request.merge_commit_sha }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute version A.B.C-XX-TENANT
        id: version
        run: |
          set -euo pipefail
          ABC=$(jq -r .version package.json)
          if [ -f VERSION_BUILD ]; then
            XX=$(tr -d '[:space:]' < VERSION_BUILD)
          else
            XX=0
          fi
          FULL="${ABC}-${XX}-${TENANT}"
          echo "full=${FULL}" >> "$GITHUB_OUTPUT"
          echo "Version calculée: ${FULL}"

      - name: Extract [ZAM-XXXX] references from PR
        id: refs
        run: |
          set -euo pipefail
          COMMITS=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json commits --jq '[.commits[].messageHeadline, .commits[].messageBody] | join("\n")')
          HAYSTACK="${PR_TITLE}
${PR_BODY}
${COMMITS}"
          ZAMS=$(echo "$HAYSTACK" | grep -oE '\[ZAM-[0-9]+\]' | grep -oE '[0-9]+' | sort -u || true)
          echo "zams<<EOF" >> "$GITHUB_OUTPUT"
          echo "$ZAMS" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Notify Zammad tickets and set pending close
        if: steps.refs.outputs.zams != ''
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.full }}"

          BODY=$(cat <<EOF
<p><strong>Déploiement</strong> 🚀</p>
<ul>
  <li><strong>Version</strong> : <code>${VERSION}</code></li>
  <li><strong>Repo</strong> : <code>${REPO}</code></li>
  <li><strong>Tenant</strong> : <code>${TENANT}</code></li>
  <li><strong>PR</strong> : <a href="${PR_URL}">#${PR_NUMBER} — ${PR_TITLE}</a> (par ${PR_AUTHOR})</li>
  <li><strong>Commit de merge</strong> : <code>${MERGE_SHA}</code></li>
</ul>
<p>Ce ticket est passé en <em>pending close</em>.</p>
EOF
)

          while IFS= read -r ZAM_NUMBER; do
            [ -z "$ZAM_NUMBER" ] && continue

            TICKET_ID=$(curl -sSf \
              -H "Authorization: Token token=${ZAMMAD_TOKEN}" \
              "${ZAMMAD_URL}/api/v1/tickets/search?query=number:${ZAM_NUMBER}&limit=1" \
              | jq -r '.[0].id // empty')

            if [ -z "$TICKET_ID" ]; then
              echo "::warning::Ticket Zammad #${ZAM_NUMBER} introuvable"
              continue
            fi

            BODY_JSON=$(jq -n \
              --arg subject "Déploiement ${VERSION} — ${REPO}" \
              --arg body "$BODY" '
              {
                state: "pending close",
                article: {
                  subject: $subject,
                  body: $body,
                  type: "note",
                  internal: false,
                  content_type: "text/html"
                }
              }')

            curl -sSf -X PUT \
              -H "Authorization: Token token=${ZAMMAD_TOKEN}" \
              -H "Content-Type: application/json" \
              -d "$BODY_JSON" \
              "${ZAMMAD_URL}/api/v1/tickets/${TICKET_ID}" > /dev/null

            echo "Ticket Zammad #${ZAM_NUMBER} notifié + pending close"
          done <<< "${{ steps.refs.outputs.zams }}"
