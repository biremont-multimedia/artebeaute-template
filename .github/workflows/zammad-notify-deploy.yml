name: Zammad - Notify Deploy

on:
  pull_request:
    types: [closed]
    branches: [main]

jobs:
  notify:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    env:
      ZAMMAD_URL: ${{ secrets.ZAMMAD_URL }}
      ZAMMAD_TOKEN: ${{ secrets.ZAMMAD_API_TOKEN }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      TENANT: ${{ vars.TENANT_NAME || 'SB' }}
      REPO: ${{ github.repository }}
      PR_NUMBER: ${{ github.event.pull_request.number }}
      PR_TITLE: ${{ github.event.pull_request.title }}
      PR_URL: ${{ github.event.pull_request.html_url }}
      PR_AUTHOR: ${{ github.event.pull_request.user.login }}
      MERGE_SHA: ${{ github.event.pull_request.merge_commit_sha }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute version
        id: version
        run: |
          set -euo pipefail
          ABC=$(jq -r .version package.json)
          XX=$([ -f VERSION_BUILD ] && tr -d '[:space:]' < VERSION_BUILD || echo 0)
          echo "full=${ABC}-${XX}-${TENANT}" >> "$GITHUB_OUTPUT"

      - name: Extract ZAM references
        id: refs
        run: |
          set -euo pipefail
          COMMITS=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json commits --jq '[.commits[].messageHeadline] | join(" ")')
          ZAMS=$(echo "${PR_TITLE} ${COMMITS}" | grep -oE '[0-9]+' | sort -u || true)
          echo "zams<<EOF" >> "$GITHUB_OUTPUT"
          echo "$ZAMS" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Notify Zammad
        if: steps.refs.outputs.zams != ''
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.full }}"
          BODY="Deploiement ${VERSION} sur ${REPO} par ${PR_AUTHOR} - PR ${PR_URL}"
          while IFS= read -r ZAM_NUMBER; do
            [ -z "$ZAM_NUMBER" ] && continue
            TICKET_ID=$(curl -sSf -H "Authorization: Token token=${ZAMMAD_TOKEN}" "${ZAMMAD_URL}/api/v1/tickets/search?query=number:${ZAM_NUMBER}&limit=1" | jq -r '.[0].id // empty')
            [ -z "$TICKET_ID" ] && continue
            curl -sSf -X PUT -H "Authorization: Token token=${ZAMMAD_TOKEN}" -H "Content-Type: application/json" -d "{\"state\":\"pending close\",\"article\":{\"subject\":\"Deploiement ${VERSION}\",\"body\":\"${BODY}\",\"type\":\"note\",\"internal\":false}}" "${ZAMMAD_URL}/api/v1/tickets/${TICKET_ID}" > /dev/null
            echo "Ticket #${ZAM_NUMBER} notifie"
          done <<< "${{ steps.refs.outputs.zams }}"
